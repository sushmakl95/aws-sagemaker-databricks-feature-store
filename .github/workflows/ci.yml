name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install "ruff>=0.4.0"
      - run: ruff check src tests scripts

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install "mypy>=1.9.0" "types-PyYAML"
      - run: mypy src --ignore-missing-imports

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install "bandit[toml]>=1.7.8"
      - run: bandit -c pyproject.toml -r src scripts -lll

  validate-feature-views:
    name: Validate Feast feature views
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "pyyaml>=6.0.1" "jsonschema>=4.21.0"
      - run: python scripts/validate_feature_views.py src/feast_repo/feature_views/

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - run: |
          cd infra/terraform
          terraform fmt -check -recursive || echo "Format issues (non-blocking)"
        continue-on-error: true
      - run: |
          cd infra/terraform
          terraform init -backend=false
          terraform validate

  test-info:
    name: "Unit tests: run locally"
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Unit tests need Java 17 + PySpark + Feast deps."
          echo "Run locally: make test-unit"
          echo "See docs/LOCAL_DEVELOPMENT.md"
