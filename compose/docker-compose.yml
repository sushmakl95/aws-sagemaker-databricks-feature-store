version: "3.8"

services:
  localstack:
    image: localstack/localstack:3.3
    hostname: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: "kinesis,dynamodb,s3,sts,iam,secretsmanager,sns,cloudwatch,logs"
      DEFAULT_REGION: us-east-1
      DEBUG: 0
      PERSISTENCE: 1
      DATA_DIR: /var/lib/localstack
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"kinesis\": \"available\"'"]
      interval: 10s
      retries: 10

  postgres:
    image: postgres:16
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: feast
      POSTGRES_PASSWORD: feast
      POSTGRES_DB: feast_registry
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feast"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    hostname: redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    hostname: mlflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://feast:feast@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlartifacts
    command: >
      sh -c "mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://feast:feast@postgres:5432/mlflow
        --default-artifact-root /mlartifacts
        --serve-artifacts"
    volumes:
      - mlflow-artifacts:/mlartifacts

volumes:
  localstack-data:
  postgres-data:
  mlflow-artifacts:
